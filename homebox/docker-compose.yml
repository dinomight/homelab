services:
  homebox:
    image: ghcr.io/sysadminsmedia/homebox:0.26.2
    container_name: homebox
    restart: unless-stopped
    environment:
      - HBOX_LOG_LEVEL=info
      - HBOX_LOG_FORMAT=text
      - HBOX_WEB_MAX_UPLOAD_SIZE=10
      - HBOX_OPTIONS_ALLOW_ANALYTICS=false
      - HBOX_AUTH_API_KEY_PEPPER=${API_KEY_PEPPER}
    volumes:
      - ${DATA_DIR}:/data/
    networks:
      - proxy

  backup:
    image: mazzolino/restic:1.8.2
    container_name: homebox-backup
    restart: unless-stopped
    volumes:
      - ${DATA_DIR}:/data:ro
      - ${RESTIC_DATA_DIR}/homebox:/root/.cache/restic
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      BACKUP_CRON: "0 0 2 * * *"
      RUN_ON_STARTUP: "true"

      RESTIC_REPOSITORY: b2:${B2_BUCKET_NAME}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID}
      B2_ACCOUNT_KEY: ${B2_ACCOUNT_KEY}

      RESTIC_BACKUP_SOURCES: /data
      RESTIC_BACKUP_ARGS: >-
        --tag homebox
        --tag sqlite
        --verbose

      RESTIC_FORGET_ARGS: >-
        --keep-daily 7
        --keep-weekly 4
        --keep-monthly 12
        
      PRE_COMMANDS: |-
        docker stop homebox

      POST_COMMANDS_SUCCESS: |-
        docker start homebox

      POST_COMMANDS_FAILURE: |-
        docker start homebox
        echo "Backup FAILED - HomeBox restarted, but check restic logs"

      TZ: ${TZ}
  
  check:
    image: mazzolino/restic:1.8.2
    container_name: homebox-check
    restart: unless-stopped
    volumes:
      - ${RESTIC_DATA_DIR}/homebox:/root/.cache/restic
    environment:
      CHECK_CRON: "0 0 4 * * 1"

      RESTIC_REPOSITORY: b2:${B2_BUCKET_NAME}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID}
      B2_ACCOUNT_KEY: ${B2_ACCOUNT_KEY}

      RESTIC_CHECK_ARGS: >-
        --verbose
        --read-data-subset=1/4

      TZ: ${TZ}

networks:
  proxy:
    external: true
