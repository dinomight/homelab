services:
  broker:
    image: docker.io/library/redis:8.8.0
    container_name: paperless-broker
    restart: unless-stopped
    volumes:
      - ${DATA_DIR}/redis:/data
    networks:
      - internal

  db:
    image: docker.io/library/postgres:18.4
    container_name: paperless-db
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=4GB", "-c", "work_mem=64MB"]
    volumes:
      - ${DATA_DIR}/postgresql:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    networks:
      - internal

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
    restart: unless-stopped
    container_name: paperless
    depends_on:
      - db
      - broker
    volumes:
      - ${DATA_DIR}/data:/usr/src/paperless/data
      - ${DATA_DIR}/media:/usr/src/paperless/media
      - ${DATA_DIR}/export:/usr/src/paperless/export
      - ${DATA_DIR}/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_URL: https://docs.${DOMAIN}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_OCR_DESKEW: false
      PAPERLESS_DATE_ORDER: MDY
      PAPERLESS_TIME_ZONE: ${TIME_ZONE}
      # Performance tuning for 12 cores / 24 threads / 500GB RAM
      PAPERLESS_TASK_WORKERS: 16
      PAPERLESS_THREADS_PER_WORKER: 1
      OMP_THREAD_LIMIT: 1
      PAPERLESS_DB_POOLSIZE: 10
    networks:
      - internal
      - proxy

  backup:
    image: mazzolino/restic:1.8.2
    container_name: paperless-backup
    restart: unless-stopped
    volumes:
      - ${DATA_DIR}/data:/data:ro
      - ${DATA_DIR}/media:/media:ro
      - ${RESTIC_DATA_DIR}/paperless:/root/.cache/restic
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      BACKUP_CRON: "0 0 2 * * *"
      RUN_ON_STARTUP: "true"

      RESTIC_REPOSITORY: b2:${B2_BUCKET_NAME}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID}
      B2_ACCOUNT_KEY: ${B2_ACCOUNT_KEY}

      RESTIC_BACKUP_SOURCES: /data /dumps /media
      RESTIC_BACKUP_ARGS: >-
        --tag paperless
        --tag postgres
        --verbose

      RESTIC_FORGET_ARGS: >-
        --keep-daily 7
        --keep-weekly 4
        --keep-monthly 12
        
      PRE_COMMANDS: |-
        docker stop paperless
        mkdir -p /dumps
        docker exec paperless-db pg_dump -U paperless paperless > /dumps/paperless.sql

      POST_COMMANDS_SUCCESS: |-
        docker start paperless

      POST_COMMANDS_FAILURE: |-
        docker start paperless
        echo "Backup FAILED - Paperless restarted, but check restic logs"

      TZ: ${TIME_ZONE}
  
  check:
    image: mazzolino/restic:1.8.2
    container_name: paperless-check
    restart: unless-stopped
    volumes:
      - ${RESTIC_DATA_DIR}/paperless:/root/.cache/restic
    environment:
      CHECK_CRON: "0 0 4 * * 1"

      RESTIC_REPOSITORY: b2:${B2_BUCKET_NAME}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      B2_ACCOUNT_ID: ${B2_ACCOUNT_ID}
      B2_ACCOUNT_KEY: ${B2_ACCOUNT_KEY}

      RESTIC_CHECK_ARGS: >-
        --verbose
        --read-data-subset=1/4

      TZ: ${TIME_ZONE}

networks:
  internal:
    driver: bridge
  proxy:
    external: true