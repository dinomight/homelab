# pihole/compose.yml
services:
  pihole:
    image: pihole/pihole:2026.05.0
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      TZ: '${TIME_ZONE}'
      FTLCONF_webserver_api_password: '${PIHOLE_PASSWORD}'
      FTLCONF_webserver_domain: 'pihole.${DOMAIN}'
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - ${DATA_DIR}:/etc/pihole
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    networks:
      - proxy

networks:
  proxy:
    external: true
