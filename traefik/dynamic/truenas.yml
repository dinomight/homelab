http:
  routers:
    truenas:
      rule: "Host(`nas.{{ env \"DOMAIN\" }}`)"
      entryPoints:
        - "websecure"
      tls:
        certResolver: "dnsimple"
      service: "truenas"
  services:
    truenas:
      loadBalancer:
        servers:
          - url: "http://{{ env \"TRUENAS_IP\" }}:8081"
        passHostHeader: true